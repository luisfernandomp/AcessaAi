<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">

    <!-- Header -->
    <div class="modal-header">
      <div class="modal-titulo-grupo">
        <div class="modal-icon-badge">
          <i class="fa-solid fa-star"></i>
        </div>
        <div>
          <h2 class="modal-titulo" id="modal-titulo">Avaliar Estabelecimento</h2>
          <p class="modal-sub">Compartilhe sua experiência de acessibilidade</p>
        </div>
      </div>
      <button class="btn-close-modal" type="button" (click)="fecharModal()" aria-label="Fechar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <!-- Estrelas -->
      <div class="campo-estrelas">
        <p class="campo-label">Sua nota <span class="obrig">*</span></p>
        <div class="estrelas-row">
          @for (n of estrelas; track n) {
            <button
              type="button"
              class="estrela-btn"
              [class.ativa]="n <= estrelaAtiva"
              (mouseenter)="estrelaHover = n"
              (mouseleave)="estrelaHover = 0"
              (click)="estrelaSelecionada = n"
              [attr.aria-label]="labels[n]"
            >
              <i class="fa-solid fa-star"></i>
            </button>
          }
        </div>
        @if (estrelaAtiva > 0) {
          <span class="estrela-label">{{ labels[estrelaAtiva] }}</span>
        }
      </div>

      <!-- Comentário -->
      <div class="campo-comentario">
        <p class="campo-label">Comentário <span class="campo-opcional">(opcional)</span></p>
        <textarea
          class="textarea-comentario"
          [(ngModel)]="comentario"
          placeholder="Conte como foi sua experiência de acessibilidade neste local..."
          rows="4"
          maxlength="500"
        ></textarea>
        <span class="char-count">{{ comentario.length }}/500</span>
      </div>

    </div>

    <!-- Footer -->
    <div class="modal-acoes">
      <button tuiButton type="button" appearance="outline" size="m" (click)="fecharModal()">
        Cancelar
      </button>
      <button tuiButton type="button" appearance="primary" size="m" [disabled]="carregando || estrelaSelecionada === 0" (click)="submit()">
        @if (carregando) { Enviando... } @else { Enviar avaliação }
      </button>
    </div>

  </div>
</div>
