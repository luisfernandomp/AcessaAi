name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/AcessaAi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Java (SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restaurar dependências
        run: dotnet restore

      - name: SonarQube Begin
        run: |
          dotnet sonarscanner begin \
            /k:"acessaai" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

      - name: Build
        run: dotnet build --no-restore

      - name: Testes unitários com cobertura
        run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: SonarQube End
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Publish
        run: dotnet publish -c Release -o ./publish

      - name: Upload to Nexus
        run: |
          tar czf acessaai-backend.tar.gz -C ./publish .
          curl -u "${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASSWORD }}" \
            --upload-file acessaai-backend.tar.gz \
            "${{ secrets.NEXUS_URL }}/repository/raw-hosted/acessaai/backend/${{ github.sha }}/acessaai-backend.tar.gz"

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/acessa-ai-site
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build Angular
        run: npm run build

      - name: Upload to Nexus
        run: |
          tar czf acessaai-frontend.tar.gz -C dist .
          curl -u "${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASSWORD }}" \
            --upload-file acessaai-frontend.tar.gz \
            "${{ secrets.NEXUS_URL }}/repository/raw-hosted/acessaai/frontend/${{ github.sha }}/acessaai-frontend.tar.gz"
